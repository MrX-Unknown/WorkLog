<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log</title>
  <style>
    /* Your existing styles */
  </style>
</head>
<body>

<!-- Tab 1 -->
<div id="tab1" class="tab">
  <h1>Work Log</h1>
  <div class="form-container" id="workLogForm">
    <div class="form-group">
      <label for="date">Date:</label>
      <input type="date" id="date">
    </div>
    <div class="form-group">
      <label for="client">Client:</label>
      <div style="display: flex; align-items: center;">
        <!-- Client Input (75% width) -->
        <input type="text" id="client" placeholder="Enter Client Name" oninput="suggestClient()" style="flex: 75%; padding: 4px 8px; font-size: 12px;">
        
        <!-- Add Button (25% width) -->
        <button type="button" onclick="addClient()" style="flex: 25%; padding: 4px 8px; font-size: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">Add</button>
      </div>
      <div id="client-suggestions" style="display: none;"></div>
    </div>
    <div class="form-group">
      <label for="activity">Activity:</label>
      <input type="text" id="activity" placeholder="Enter Activity" oninput="suggestActivity()">
      <div id="activity-suggestions" style="display: none;"></div>
    </div>
    <div class="form-group">
      <label for="status">Status:</label>
      <select id="status">
        <option value="new">New</option>
        <option value="ongoing">On Going</option>
        <option value="done">Done</option>
      </select>
    </div>
    <div class="form-group" id="update-container" style="display:none;">
      <label for="update">Update:</label>
      <input type="text" id="update" placeholder="Enter update for this activity">
    </div>
    <div class="form-group">
      <button onclick="saveLog()">Enter</button>
    </div>
  </div>

  <div class="history-container">
    <h2>Activity History</h2>
    <div class="scrollable">
      <table id="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>Activity</th>
            <th>Status</th>
            <th>Update</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Tab 2 -->
<div id="tab2" class="tab" style="display:none;">
  <h1>Work Log</h1>
  <h2 class="subtitle">Client Activity</h2>
  <div class="client-activity-container">
    <label for="client-select">Select Client:</label>
    <select id="client-select" onchange="renderClientActivity()"></select>
    <div class="scrollable">
      <table id="client-activity-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Activity</th>
            <th>Update</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ---------------- Tab 1 Data
let clientHistory = [];
let logData = [];
let lastSelectedClient = null;

// ---------------- Local Storage Functions
function loadFromLocalStorage() {
  const savedClientHistory = localStorage.getItem('clientHistory');
  const savedLogData = localStorage.getItem('logData');

  if (savedClientHistory) {
    clientHistory = JSON.parse(savedClientHistory);
  }

  if (savedLogData) {
    logData = JSON.parse(savedLogData);
  }
}

// Save to localStorage
function saveToLocalStorage() {
  localStorage.setItem('clientHistory', JSON.stringify(clientHistory));
  localStorage.setItem('logData', JSON.stringify(logData));
}

// Call this function on page load to initialize data
window.onload = function() {
  loadFromLocalStorage();
  renderClientDropdown();
  updateHistoryTable();
};

// ---------------- Save Log Function
function saveLog() {
  let date = document.getElementById('date').value;
  let client = document.getElementById('client').value;
  let activity = document.getElementById('activity').value;
  let status = document.getElementById('status').value;
  let updateValue = document.getElementById('update').value;

  if (!date || !client || !activity || !status) {
    alert('Please fill all fields');
    return;
  }

  if (!clientHistory.includes(client)) clientHistory.push(client);
  if (!activityHistory[client]) activityHistory[client] = [];
  if (!activityHistory[client].includes(activity)) activityHistory[client].push(activity);

  logData.push({ date, client, activity, status, update: updateValue });
  
  saveToLocalStorage();  // Save data to localStorage after updating it
  updateHistoryTable();
  renderClientDropdown();

  // Reset fields
  document.getElementById('date').value = '';
  document.getElementById('client').value = '';
  document.getElementById('activity').value = '';
  document.getElementById('status').value = 'new';
  document.getElementById('update').value = '';
  document.getElementById('update-container').style.display = 'none';
}

// ---------------- History Table Update
function updateHistoryTable() {
  let tbody = document.getElementById('history-table').getElementsByTagName('tbody')[0];
  tbody.innerHTML = '';
  logData.forEach((log, index) => {
    let row = tbody.insertRow();
    row.insertCell(0).innerText = log.date;
    row.insertCell(1).innerText = log.client;
    row.insertCell(2).innerText = log.activity;
    row.insertCell(3).innerText = log.status;
    row.insertCell(4).innerText = log.update;

    let actions = row.insertCell(5);
    actions.classList.add('action-buttons');
    let editBtn = document.createElement('button');
    editBtn.innerText = 'Edit';
    editBtn.classList.add('edit-button');
    editBtn.onclick = () => editLog(index);

    let deleteBtn = document.createElement('button');
    deleteBtn.innerText = 'Delete';
    deleteBtn.classList.add('delete-button');
    deleteBtn.onclick = () => deleteLog(index);

    actions.appendChild(editBtn);
    actions.appendChild(deleteBtn);
  });
}

// ---------------- Tab 2 Client Activity
function renderClientDropdown() {
  const select = document.getElementById('client-select');
  const prev = lastSelectedClient;
  select.innerHTML = clientHistory.map(c => `<option value="${c}">${c}</option>`).join('');
  if (prev) select.value = prev;
}

function renderClientActivity() {
  const client = document.getElementById('client-select').value;
  lastSelectedClient = client;
  const tbody = document.getElementById('client-activity-table').getElementsByTagName('tbody')[0];
  tbody.innerHTML = '';
  const clientLogs = logData.filter(l => l.client === client);
  const grouped = {};

  clientLogs.forEach(l => {
    if (!grouped[l.activity]) grouped[l.activity] = [];
    grouped[l.activity].push(l);
  });

  Object.keys(grouped).forEach(act => {
    grouped[act].forEach(l => {
      let row = tbody.insertRow();
      row.insertCell(0).innerText = l.date;
      row.insertCell(1).innerText = l.activity;
      row.insertCell(2).innerText = l.update;
      row.insertCell(3).innerText = l.status;
      if (l.status === 'new') row.style.fontWeight = 'bold';
    });
  });
}

// ---------------- Tabs toggle (unchanged from your previous code)
let lastTap = 0;
function toggleTab() {
  const tab1 = document.getElementById('tab1');
  const tab2 = document.getElementById('tab2');
  if (tab1.style.display !== 'none') {
    tab1.style.display = 'none';
    tab2.style.display = 'block';
    renderClientDropdown();
    renderClientActivity();
  } else {
    tab1.style.display = 'block';
    tab2.style.display = 'none';
  }
}

document.addEventListener('dblclick', toggleTab);
document.addEventListener('pointerdown', e => {
  const currentTime = new Date().getTime();
  const tapLength = currentTime - lastTap;
  if (tapLength < 500 && tapLength > 0) {
    toggleTab();
    e.preventDefault();
  }
  lastTap = currentTime;
});
</script>

</body>
</html>
