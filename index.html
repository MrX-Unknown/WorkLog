<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Work Log</h1>

  <!-- Tab Buttons -->
  <div class="tabs-container">
    <button class="tab-button" onclick="showTab(1)">Activity Log</button>
    <button class="tab-button" onclick="showTab(2)">Client Log</button>
    <button class="tab-button" onclick="showTab(3)">Removed Log</button>
  </div>

  <!-- Tab 1: Activity Log -->
  <div id="tab1" class="tab">
    <div class="form-container">
      <div class="form-group">
        <label>Date:</label>
        <input type="date" id="date">
      </div>

      <div class="form-group">
        <label>Client:</label>
        <input type="text" id="client" placeholder="Type client" oninput="suggestClient()" onfocus="suggestClient()">
        <div id="client-suggestions" class="suggestions-box"></div>
      </div>

      <div class="form-group">
        <label>Activity:</label>
        <input type="text" id="activity" placeholder="Type activity" oninput="suggestActivity()">
        <div id="activity-suggestions" class="suggestions-box"></div>
      </div>

      <div class="form-group">
        <label>Status:</label>
        <select id="status">
          <option value="new">New</option>
          <option value="ongoing">On Going</option>
          <option value="done">Done</option>
        </select>
      </div>

      <div class="form-group" id="update-container">
        <label>Update:</label>
        <input type="text" id="update" placeholder="Add update for ongoing activity">
      </div>

      <div class="form-group">
        <button onclick="saveLog()">Enter</button>
      </div>
    </div>

    <div class="history-container">
      <table id="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>Activity</th>
            <th>Status</th>
            <th>Update</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Tab 2: Client Log -->
  <div id="tab2" class="tab">
    <div class="client-activity-container">
      <label>Select Client:</label>
      <select id="client-select" onchange="renderClientActivity()"></select>

      <div class="scrollable">
        <table id="client-activity-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Activity</th>
              <th>Update</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab 3: Removed Clients -->
  <div id="tab3" class="tab">
    <div class="removed-clients-container">
      <div class="scrollable">
        <table id="removed-clients-table">
          <thead>
            <tr><th>Client</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
