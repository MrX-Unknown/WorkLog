```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Log</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background-color: #f4f4f4;
}

h1 {
  text-align: center;
  font-size: 48px;
}

.form-container {
  max-width: 600px;
  margin: 20px auto;
  background: #fff;
  padding: 15px;
  border-radius: 8px;
}

.form-group {
  margin-bottom: 10px;
}

input, select {
  width: 100%;
  padding: 6px;
}

button {
  padding: 6px;
  cursor: pointer;
}

.tab { display: none; }

.tab-button {
  padding: 10px;
  margin: 5px;
  background: green;
  color: white;
  border: none;
}

.active-tab-button {
  background: darkgreen;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
}

.scrollable {
  max-height: 250px;
  overflow-y: auto;
}
</style>
</head>

<body>

<h1>Work Log</h1>

<div style="text-align:center;">
  <button class="tab-button active-tab-button" onclick="showTab(1)">Activity Log</button>
  <button class="tab-button" onclick="showTab(2)">Client Log</button>
  <button class="tab-button" onclick="showTab(3)">Removed</button>
</div>

<!-- TAB 1 -->
<div id="tab1" class="tab" style="display:block;">
<div class="form-container">

<div class="form-group">
<input type="date" id="date">
</div>

<div class="form-group">
<input type="text" id="client" placeholder="Client">
<button onclick="addClient()">Add</button>
<button onclick="removeClient()">Remove</button>
<div id="client-suggestions"></div>
</div>

<div class="form-group">
<input type="text" id="activity" placeholder="Activity" oninput="suggestActivity()">
<div id="activity-suggestions"></div>
</div>

<div class="form-group">
<select id="status">
<option value="new">New</option>
<option value="ongoing">Ongoing</option>
<option value="done">Done</option>
</select>
</div>

<div class="form-group" id="update-container" style="display:none;">
<input type="text" id="update" placeholder="Update">
</div>

<button onclick="saveLog()">Save</button>

</div>

<div class="scrollable">
<table id="history-table">
<thead>
<tr>
<th>Date</th>
<th>Client</th>
<th>Activity</th>
<th>Status</th>
<th>Update</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
<select id="client-select" onchange="renderClientActivity()"></select>

<div class="scrollable">
<table id="client-activity-table">
<thead>
<tr>
<th>Date</th>
<th>Activity</th>
<th>Update</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
<div class="scrollable">
<table id="removed-clients-table">
<thead><tr><th>Removed Clients</th></tr></thead>
<tbody></tbody>
</table>
</div>
</div>

<script>
let clientHistory = [];
let activityHistory = {};
let logData = [];
let removedClients = [];

/* TAB SWITCH */
function showTab(n){
  document.querySelectorAll('.tab').forEach(t=>t.style.display='none');
  document.getElementById('tab'+n).style.display='block';
}

/* SAVE LOG */
function saveLog(){
  const date = dateInput.value;
  const client = clientInput.value.trim();
  const activity = activityInput.value.trim();
  const status = statusInput.value;
  const update = updateInput.value;

  if(!date || !client || !activity){
    alert("Fill all fields");
    return;
  }

  logData.push({date,client,activity,status,update});

  if(!activityHistory[client]) activityHistory[client]=[];
  if(!activityHistory[client].includes(activity)){
    activityHistory[client].push(activity);
  }

  saveStorage();
  updateTable();
  renderClientDropdown();

  activityInput.value="";
  updateInput.value="";
}

/* TABLE */
function updateTable(){
  const tbody = document.querySelector("#history-table tbody");
  tbody.innerHTML="";

  logData.forEach((l,i)=>{
    let row = tbody.insertRow();
    row.innerHTML = `
      <td>${l.date}</td>
      <td>${l.client}</td>
      <td>${l.activity}</td>
      <td>${l.status}</td>
      <td>${l.update}</td>
      <td><button onclick="deleteLog(${i})">Delete</button></td>
    `;
  });
}

/* DELETE */
function deleteLog(i){
  logData.splice(i,1);
  saveStorage();
  updateTable();
}

/* CLIENT */
const clientInput = document.getElementById("client");

function addClient(){
  let c = clientInput.value.trim();
  if(c && !clientHistory.includes(c)){
    clientHistory.push(c);
    saveStorage();
    renderClientDropdown();
  }
}

function removeClient(){
  let c = clientInput.value.trim();
  let i = clientHistory.indexOf(c);

  if(i!==-1){
    clientHistory.splice(i,1);
    removedClients.push(c);
    saveStorage();
    renderRemoved();
    renderClientDropdown();
  }
}

/* DROPDOWN */
function renderClientDropdown(){
  const select = document.getElementById("client-select");
  select.innerHTML = clientHistory.map(c=>`<option>${c}</option>`).join("");
}

/* CLIENT ACTIVITY */
function renderClientActivity(){
  const c = document.getElementById("client-select").value;
  const tbody = document.querySelector("#client-activity-table tbody");
  tbody.innerHTML="";

  logData.filter(l=>l.client===c).forEach(l=>{
    let row = tbody.insertRow();
    row.innerHTML = `
      <td>${l.date}</td>
      <td>${l.activity}</td>
      <td>${l.update}</td>
      <td>${l.status}</td>
    `;
  });
}

/* REMOVED */
function renderRemoved(){
  const tbody = document.querySelector("#removed-clients-table tbody");
  tbody.innerHTML="";
  removedClients.forEach(c=>{
    let row = tbody.insertRow();
    row.innerHTML=`<td>${c}</td>`;
  });
}

/* ACTIVITY SUGGEST */
const activityInput = document.getElementById("activity");

function suggestActivity(){
  const client = clientInput.value;
  const box = document.getElementById("activity-suggestions");

  if(!activityHistory[client]) return;

  let list = activityHistory[client];
  box.innerHTML = list.map(a=>`<div onclick="selectActivity('${a}')">${a}</div>`).join("");
}

function selectActivity(a){
  activityInput.value = a;
}

/* STATUS SHOW UPDATE */
const statusInput = document.getElementById("status");
const updateInput = document.getElementById("update");

statusInput.addEventListener("change",()=>{
  document.getElementById("update-container").style.display =
    statusInput.value==="new" ? "none" : "block";
});

/* STORAGE */
function saveStorage(){
  localStorage.setItem("clients",JSON.stringify(clientHistory));
  localStorage.setItem("logs",JSON.stringify(logData));
  localStorage.setItem("activities",JSON.stringify(activityHistory));
  localStorage.setItem("removed",JSON.stringify(removedClients));
}

function loadStorage(){
  clientHistory = JSON.parse(localStorage.getItem("clients")) || [];
  logData = JSON.parse(localStorage.getItem("logs")) || [];
  activityHistory = JSON.parse(localStorage.getItem("activities")) || {};
  removedClients = JSON.parse(localStorage.getItem("removed")) || [];

  updateTable();
  renderClientDropdown();
  renderRemoved();
}

window.onload = loadStorage;
</script>

</body>
</html>
