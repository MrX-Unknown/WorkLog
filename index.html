<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 id="title">Work Log</h1>

<!-- Tab Buttons -->
<div class="tab-buttons">
  <button class="tab-button active-tab-button" onclick="showTab(1)">Activity Log</button>
  <button class="tab-button" onclick="showTab(2)">Client Log</button>
  <button class="tab-button" onclick="showTab(3)">Removed Log</button>
</div>

<!-- TAB 1: Activity Log -->
<div id="tab1" class="tab" style="display:block;">
  <div id="work-log-section">

    <div class="form-group">
      <label for="date">Date:</label>
      <input type="date" id="date">
    </div>

    <div class="form-group">
      <label for="client">Client:</label>
      <input type="text" id="client" placeholder="Enter Client" oninput="suggestClient()" onfocus="suggestClient()">
      <ul id="client-suggestions" style="display:none;"></ul>
    </div>

    <div class="form-group">
      <label for="activity">Activity:</label>
      <input type="text" id="activity" placeholder="Enter Activity" oninput="suggestActivity()">
      <ul id="activity-suggestions" style="display:none;"></ul>
    </div>

    <div class="form-group">
      <label for="update">Update:</label>
      <input type="text" id="update" placeholder="Enter Update">
    </div>

    <div class="form-group">
      <label for="status">Status:</label>
      <select id="status">
        <option value="new">New</option>
        <option value="ongoing">On Going</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="form-group">
      <button onclick="saveLog()">Enter</button>
    </div>
  </div>

  <div id="history-table-container">
    <table id="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Client</th>
          <th>Activity</th>
          <th>Update</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- TAB 2: Client Activity -->
<div id="tab2" class="tab">
  <div id="client-activity-tab">
    <label for="client-select">Select Client:</label>
    <select id="client-select" onchange="renderClientActivity()"></select>

    <div class="scrollable">
      <table id="client-activity-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Activity</th>
            <th>Update</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- TAB 3: Removed Clients -->
<div id="tab3" class="tab">
  <div id="activity-history">
    <div class="scrollable">
      <table id="removed-clients-table">
        <thead>
          <tr><th>Client</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
