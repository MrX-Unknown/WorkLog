<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Work Log Dashboard</title> 
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 
    <div class="app-container"> 
        <h1>Work Log Dashboard</h1> 

        <!-- Tabs --> 
        <div class="tabs"> 
            <button class="tab-button active-tab-button" onclick="showTab(1)">Activity Log</button> 
            <button class="tab-button" onclick="showTab(2)">Client Log</button> 
            <button class="tab-button" onclick="showTab(3)">Accomplished Log</button> 
        </div> 

        <!-- TAB 1 --> 
        <div id="tab1" class="tab" style="display:block;"> 
            <div class="grid"> 
                <!-- FORM --> 
                <div class="card"> 
                    <h2>Add Activity</h2> 
                    <div class="form-group"> 
                        <label>Date</label> 
                        <input type="date" id="date"> 
                    </div> 
                    <div class="form-group"> 
                        <label>CEM</label> 
                        <input type="text" id="cem"> 
                        <div id="cem-suggestions" class="suggestions"></div> 
                    </div> 
                    <div class="form-group"> 
                        <label>Lawyer</label> 
                        <input type="text" id="lawyer"> 
                        <div id="lawyer-suggestions" class="suggestions"></div> 
                    </div> 
                    <div class="form-group"> 
                        <label>Client</label> 
                        <input type="text" id="client"> 
                        <div id="client-suggestions" class="suggestions"></div> 
                    </div> 
                    <div class="form-group"> 
                        <label>Activity</label> 
                        <input type="text" id="activity"> 
                        <div id="activity-suggestions" class="suggestions"></div> 
                    </div> 
                    <div class="form-group"> 
                        <label>Status</label> 
                        <select id="status" onchange="handleStatusChange()"> 
                            <option value="new">New</option> 
                            <option value="ongoing">On Going</option> 
                            <option value="done">Done</option> 
                        </select> 
                    </div> 
                    <div class="form-group" id="update-container"> 
                        <label>Update</label> 
                        <input type="text" id="update"> 
                    </div> 

                    <!-- Buttons Row --> 
                    <div class="form-actions" style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <button class="primary-btn" onclick="saveLog()">Enter</button>
                        <button class="secondary-btn" onclick="clearForm()">Clear</button>
                    </div>

                </div> 

                <!-- TABLE --> 
                <div class="card"> 
                    <h2>Activity History</h2> 
                    <div class="scrollable"> 
                        <table id="history-table"> 
                            <thead> 
                                <tr> 
                                    <th>Date</th> 
                                    <th>CEM</th> 
                                    <th>Lawyer</th> 
                                    <th>Client</th> 
                                    <th>Activity</th> 
                                    <th>Update</th> 
                                    <th>Status</th> 
                                    <th>Actions</th> 
                                </tr> 
                            </thead> 
                            <tbody></tbody> 
                        </table> 
                    </div> 
                </div> 
            </div> 
        </div> 

        <!-- TAB 2 --> 
        <div id="tab2" class="tab"> 
            <div class="card"> 
                <h2>Client Activity</h2> 
                <select id="client-select"></select> 
                <div class="scrollable"> 
                    <table id="client-activity-table"> 
                        <thead> 
                            <tr> 
                                <th>Date</th> 
                                <th>CEM</th> 
                                <th>Lawyer</th> 
                                <th>Client</th> 
                                <th>Activity</th> 
                                <th>Update</th> 
                                <th>Status</th> 
                            </tr> 
                        </thead> 
                        <tbody></tbody> 
                    </table> 
                </div> 
            </div> 
        </div> 

        <!-- TAB 3 --> 
        <div id="tab3" class="tab"> 
            <div class="card"> 
                <h2>Accomplished Log</h2> 
                <div class="scrollable"> 
                    <table id="accomplished-table"> 
                        <thead> 
                            <tr> 
                                <th>Date</th> 
                                <th>CEM</th> 
                                <th>Lawyer</th> 
                                <th>Client</th> 
                                <th>Activity</th> 
                                <th>Update</th> 
                                <th>Status</th> 
                                <th>Action</th> 
                            </tr> 
                        </thead> 
                        <tbody></tbody> 
                    </table> 
                </div> 
            </div> 
        </div> 
    </div> 

    <script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">

    <script src="script.js"></script> 
</body> 
</html>
