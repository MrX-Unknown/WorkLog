<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Log</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background-color: #f4f4f4;
}

h1 {
  text-align: center;
  font-size: 64px;
  font-weight: bold;
}

h2.subtitle {
  text-align: center;
  font-size: 24px;
  margin: 5px 0 20px 0;
}

/* NEW TAB BUTTONS */
.tab-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
}

.tab-buttons button {
  padding: 10px 20px;
  background-color: #888;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.tab-buttons button:hover {
  background-color: #555;
}

.form-container {
  max-width: 600px;
  margin: auto;
  background: #fff;
  padding: 10px;
  border-radius: 8px;
}

.form-group { margin-bottom: 10px; }

.form-group input, .form-group select {
  width: 100%;
  padding: 5px;
}

button { cursor: pointer; }

.history-container, .client-activity-container {
  margin-top: 20px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border: 1px solid #ddd;
}

th {
  background: #4CAF50;
  color: white;
}

.edit-button { background: #2196F3; color: white; }
.delete-button { background: #f44336; color: white; }
</style>
</head>

<body>

<!-- TAB 1 -->
<div id="tab1">
  <h1>Work Log</h1>

  <!-- BUTTONS -->
  <div class="tab-buttons">
    <button onclick="showTab(1)">Activity History</button>
    <button onclick="showTab(2)">Client Activity</button>
  </div>

  <div class="form-container">
    <div class="form-group">
      <input type="date" id="date">
    </div>

    <div class="form-group">
      <input type="text" id="client" placeholder="Client">
    </div>

    <div class="form-group">
      <input type="text" id="activity" placeholder="Activity">
    </div>

    <div class="form-group">
      <select id="status">
        <option value="new">New</option>
        <option value="ongoing">On Going</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="form-group" id="update-container" style="display:none;">
      <input type="text" id="update" placeholder="Update">
    </div>

    <button onclick="saveLog()">Enter</button>
  </div>

  <div class="history-container">
    <h2>Activity History</h2>
    <table id="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Client</th>
          <th>Activity</th>
          <th>Status</th>
          <th>Update</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- TAB 2 -->
<div id="tab2" style="display:none;">
  <h1>Work Log</h1>

  <!-- BUTTONS -->
  <div class="tab-buttons">
    <button onclick="showTab(1)">Activity History</button>
    <button onclick="showTab(2)">Client Activity</button>
  </div>

  <h2 class="subtitle">Client Activity</h2>

  <div class="client-activity-container">
    <select id="client-select" onchange="renderClientActivity()"></select>

    <table id="client-activity-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Activity</th>
          <th>Update</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let clientHistory = [];
let activityHistory = {};
let logData = [];
let lastSelectedClient = null;

/* LOAD DATA */
window.onload = function() {
  loadFromStorage();
};

/* SHOW TAB */
function showTab(tab) {
  document.getElementById('tab1').style.display = (tab === 1) ? 'block' : 'none';
  document.getElementById('tab2').style.display = (tab === 2) ? 'block' : 'none';

  if (tab === 2) {
    renderClientDropdown();
    renderClientActivity();
  }
}

/* STATUS CHANGE */
document.getElementById('status').addEventListener('change', function() {
  document.getElementById('update-container').style.display =
    this.value === 'ongoing' ? 'block' : 'none';
});

/* SAVE LOG */
function saveLog() {
  const date = dateEl().value;
  const client = clientEl().value;
  const activity = activityEl().value;
  const status = statusEl().value;
  const update = updateEl().value;

  if (!date || !client || !activity) {
    alert("Fill all fields");
    return;
  }

  if (!clientHistory.includes(client)) clientHistory.push(client);

  if (!activityHistory[client]) activityHistory[client] = [];
  if (!activityHistory[client].includes(activity))
    activityHistory[client].push(activity);

  logData.push({ date, client, activity, status, update });

  saveToStorage();
  updateTable();

  dateEl().value = "";
  clientEl().value = "";
  activityEl().value = "";
  updateEl().value = "";
}

/* UPDATE TABLE */
function updateTable() {
  const tbody = document.querySelector("#history-table tbody");
  tbody.innerHTML = "";

  logData.forEach((log, i) => {
    const row = tbody.insertRow();

    row.innerHTML = `
      <td>${log.date}</td>
      <td>${log.client}</td>
      <td>${log.activity}</td>
      <td>${log.status}</td>
      <td>${log.update}</td>
      <td>
        <button onclick="editLog(${i})">Edit</button>
        <button onclick="deleteLog(${i})">Delete</button>
      </td>
    `;
  });
}

/* EDIT */
function editLog(i) {
  const log = logData[i];

  dateEl().value = log.date;
  clientEl().value = log.client;
  activityEl().value = log.activity;
  statusEl().value = log.status;
  updateEl().value = log.update;

  deleteLog(i);
}

/* DELETE */
function deleteLog(i) {
  logData.splice(i, 1);
  saveToStorage();
  updateTable();
}

/* CLIENT DROPDOWN */
function renderClientDropdown() {
  const select = document.getElementById("client-select");

  select.innerHTML = clientHistory
    .map(c => `<option>${c}</option>`)
    .join("");
}

/* CLIENT ACTIVITY */
function renderClientActivity() {
  const client = document.getElementById("client-select").value;
  const tbody = document.querySelector("#client-activity-table tbody");

  tbody.innerHTML = "";

  logData
    .filter(l => l.client === client)
    .forEach(l => {
      const row = tbody.insertRow();
      row.innerHTML = `
        <td>${l.date}</td>
        <td>${l.activity}</td>
        <td>${l.update}</td>
        <td>${l.status}</td>
      `;
    });
}

/* STORAGE */
function saveToStorage() {
  localStorage.setItem("clients", JSON.stringify(clientHistory));
  localStorage.setItem("activities", JSON.stringify(activityHistory));
  localStorage.setItem("logs", JSON.stringify(logData));
}

function loadFromStorage() {
  clientHistory = JSON.parse(localStorage.getItem("clients")) || [];
  activityHistory = JSON.parse(localStorage.getItem("activities")) || {};
  logData = JSON.parse(localStorage.getItem("logs")) || [];

  updateTable();
}

/* HELPERS */
const dateEl = () => document.getElementById("date");
const clientEl = () => document.getElementById("client");
const activityEl = () => document.getElementById("activity");
const statusEl = () => document.getElementById("status");
const updateEl = () => document.getElementById("update");

</script>

</body>
</html>
