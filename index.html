<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Hamburger Menu Button -->
<div id="hamburger-menu" class="hamburger-menu">
  &#9776;
</div>

<!-- Settings Panel -->
<div id="settings-panel" class="settings-panel">
  <h3>Choose Color Scheme</h3>
  <button class="color-option" onclick="setColorScheme('pastel')">Pastel</button>
  <button class="color-option" onclick="setColorScheme('dark')">Dark Mode</button>
  <button class="color-option" onclick="setColorScheme('light')">Light Mode</button>
  <button onclick="closeSettingsPanel()">Close</button>
</div>

<h1>Work Log</h1>

<div style="text-align: center;">
  <button class="tab-button active-tab-button" onclick="showTab(1)">Activity Log</button>
  <button class="tab-button" onclick="showTab(2)">Client Log</button>
  <button class="tab-button" onclick="showTab(3)">Accomplished Log</button>
</div>

<!-- TAB 1 -->
<div id="tab1" class="tab" style="display:block;">
  <div class="form-container">
    <div class="form-group">
      <label>Date:</label>
      <input type="date" id="date">
    </div>

    <div class="form-group">
      <label>CEM:</label>
      <input type="text" id="cem" oninput="suggestCem()">
      <div id="cem-suggestions" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label>Atty. in Charge:</label>
      <input type="text" id="attorney" oninput="suggestAttorney()">
      <div id="attorney-suggestions" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label>Client:</label>
      <input type="text" id="client" oninput="suggestClient()">
      <div id="client-suggestions" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label>Activity:</label>
      <input type="text" id="activity" oninput="suggestActivity()">
      <div id="activity-suggestions" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label>Status:</label>
      <select id="status" onchange="handleStatusChange()">
        <option value="new">New</option>
        <option value="ongoing">On Going</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="form-group" id="update-container" style="display:none;">
      <label>Update:</label>
      <input type="text" id="update">
    </div>

    <div class="form-group">
      <button onclick="saveLog()">Enter</button>
    </div>
  </div>

  <div class="history-container">
    <table id="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>CEM</th>
          <th>Atty. in Charge</th>
          <th>Client</th>
          <th>Activity</th>
          <th>Status</th>
          <th>Update</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
  <div class="client-activity-container">
    <select id="client-select" onchange="renderClientActivity()"></select>

    <div class="scrollable">
      <table id="client-activity-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>CEM</th>
            <th>Atty. in Charge</th>
            <th>Activity</th>
            <th>Status</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
  <div class="accomplished-activity-container">
    <div class="scrollable">
      <table id="accomplished-activity-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>CEM</th>
            <th>Atty. in Charge</th>
            <th>Client</th>
            <th>Activity</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="scripts.js"></script>
</body>
</html>
