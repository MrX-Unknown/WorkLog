<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Log</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

h1 {
  text-align: center;
}

/* TAB BUTTONS */
.tab-buttons {
  text-align: center;
  margin-bottom: 15px;
}

.tab-buttons button {
  padding: 10px 20px;
  margin: 5px;
  background: gray;
  color: white;
  border: none;
  border-radius: 5px;
}

/* FORM */
.form-container {
  background: white;
  padding: 10px;
  max-width: 500px;
  margin: auto;
}

input, select {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
}

/* TABLE */
table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 8px;
}

th {
  background: green;
  color: white;
}
</style>
</head>

<body>

<!-- TAB 1 -->
<div id="tab1">
  <h1>Work Log</h1>

  <div class="tab-buttons">
    <button onclick="showTab(1)">Activity History</button>
    <button onclick="showTab(2)">Client Activity</button>
  </div>

  <div class="form-container">
    <input type="date" id="date">
    <input type="text" id="client" placeholder="Client">
    <input type="text" id="activity" placeholder="Activity">

    <select id="status">
      <option value="new">New</option>
      <option value="ongoing">On Going</option>
      <option value="done">Done</option>
    </select>

    <input type="text" id="update" placeholder="Update (optional)">

    <button onclick="saveLog()">SAVE</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Client</th>
        <th>Activity</th>
        <th>Status</th>
        <th>Update</th>
      </tr>
    </thead>
    <tbody id="history"></tbody>
  </table>
</div>

<!-- TAB 2 -->
<div id="tab2" style="display:none;">
  <h1>Client Activity</h1>

  <div class="tab-buttons">
    <button onclick="showTab(1)">Activity History</button>
    <button onclick="showTab(2)">Client Activity</button>
  </div>

  <select id="clientSelect" onchange="showClientData()"></select>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Activity</th>
        <th>Status</th>
        <th>Update</th>
      </tr>
    </thead>
    <tbody id="clientTable"></tbody>
  </table>
</div>

<script>
let logs = JSON.parse(localStorage.getItem("logs")) || [];

/* SWITCH TAB */
function showTab(tab) {
  document.getElementById("tab1").style.display = tab === 1 ? "block" : "none";
  document.getElementById("tab2").style.display = tab === 2 ? "block" : "none";

  if (tab === 2) loadClients();
}

/* SAVE DATA */
function saveLog() {
  const date = document.getElementById("date").value;
  const client = document.getElementById("client").value;
  const activity = document.getElementById("activity").value;
  const status = document.getElementById("status").value;
  const update = document.getElementById("update").value;

  if (!date || !client || !activity) {
    alert("Fill all fields!");
    return;
  }

  logs.push({ date, client, activity, status, update });

  localStorage.setItem("logs", JSON.stringify(logs));

  renderTable();
  clearForm();
}

/* DISPLAY TABLE */
function renderTable() {
  const tbody = document.getElementById("history");
  tbody.innerHTML = "";

  logs.forEach(log => {
    tbody.innerHTML += `
      <tr>
        <td>${log.date}</td>
        <td>${log.client}</td>
        <td>${log.activity}</td>
        <td>${log.status}</td>
        <td>${log.update}</td>
      </tr>
    `;
  });
}

/* LOAD CLIENT DROPDOWN */
function loadClients() {
  const select = document.getElementById("clientSelect");

  let clients = [...new Set(logs.map(l => l.client))];

  select.innerHTML = clients.map(c => `<option>${c}</option>`).join("");

  showClientData();
}

/* SHOW CLIENT DATA */
function showClientData() {
  const client = document.getElementById("clientSelect").value;
  const tbody = document.getElementById("clientTable");

  tbody.innerHTML = "";

  logs.filter(l => l.client === client).forEach(l => {
    tbody.innerHTML += `
      <tr>
        <td>${l.date}</td>
        <td>${l.activity}</td>
        <td>${l.status}</td>
        <td>${l.update}</td>
      </tr>
    `;
  });
}

/* CLEAR FORM */
function clearForm() {
  document.getElementById("date").value = "";
  document.getElementById("client").value = "";
  document.getElementById("activity").value = "";
  document.getElementById("update").value = "";
}

/* LOAD ON START */
renderTable();
</script>

</body>
</html>
