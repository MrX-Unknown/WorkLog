<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Log</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

h1 { text-align:center; }

.form-container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 15px;
  border-radius: 8px;
}

input, select, button {
  width: 100%;
  margin-top: 5px;
  padding: 6px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

.logout {
  background: red;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
}

th {
  background: #4CAF50;
  color: white;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth-container" class="form-container">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="register()" style="background:#2196F3;">Register</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <button class="logout" onclick="logout()">Logout</button>

  <h1>Work Log</h1>

  <div class="form-container">
    <input type="date" id="date">
    <input type="text" id="client" placeholder="Client">
    <input type="text" id="activity" placeholder="Activity">

    <select id="status">
      <option value="new">New</option>
      <option value="ongoing">On Going</option>
      <option value="done">Done</option>
    </select>

    <input type="text" id="update" placeholder="Update (optional)">
    <button onclick="saveLog()">Save</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Client</th>
        <th>Activity</th>
        <th>Status</th>
        <th>Update</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
let currentUser = null;
let logData = [];

/* ================= AUTH ================= */

// REGISTER
function register() {
  let u = username.value;
  let p = password.value;

  let users = JSON.parse(localStorage.getItem('users')) || {};

  if (users[u]) return alert("User exists");

  users[u] = p;
  localStorage.setItem('users', JSON.stringify(users));

  alert("Registered!");
}

// LOGIN
function login() {
  let u = username.value;
  let p = password.value;

  let users = JSON.parse(localStorage.getItem('users')) || {};

  if (users[u] === p) {
    currentUser = u;
    localStorage.setItem('loggedInUser', u);
    showApp();
  } else {
    alert("Invalid login");
  }
}

// LOGOUT
function logout() {
  localStorage.removeItem('loggedInUser');
  location.reload();
}

// SHOW APP
function showApp() {
  document.getElementById('auth-container').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  loadData();
}

/* ================= DATA ================= */

function saveData() {
  localStorage.setItem(`logs_${currentUser}`, JSON.stringify(logData));
}

function loadData() {
  let saved = localStorage.getItem(`logs_${currentUser}`);
  logData = saved ? JSON.parse(saved) : [];
  render();
}

/* ================= LOG ================= */

function saveLog() {
  let log = {
    date: date.value,
    client: client.value,
    activity: activity.value,
    status: status.value,
    update: update.value
  };

  if (!log.date || !log.client || !log.activity) {
    return alert("Fill all required fields");
  }

  logData.push(log);
  saveData();
  render();

  // clear
  date.value = "";
  client.value = "";
  activity.value = "";
  update.value = "";
}

function deleteLog(i) {
  if (confirm("Delete?")) {
    logData.splice(i,1);
    saveData();
    render();
  }
}

function render() {
  let html = "";

  logData.forEach((l,i)=>{
    html += `
      <tr>
        <td>${l.date}</td>
        <td>${l.client}</td>
        <td>${l.activity}</td>
        <td>${l.status}</td>
        <td>${l.update}</td>
        <td><button onclick="deleteLog(${i})">X</button></td>
      </tr>
    `;
  });

  tableBody.innerHTML = html;
}

/* ================= AUTO LOGIN ================= */

window.onload = () => {
  let savedUser = localStorage.getItem('loggedInUser');

  if (savedUser) {
    currentUser = savedUser;
    showApp();
  }
};
</script>

</body>
</html>
