<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Work Log</h1>

  <!-- Tab Buttons -->
  <div class="tab-buttons">
    <button class="tab-button active-tab-button" onclick="showTab(1)">Work Log</button>
    <button class="tab-button" onclick="showTab(2)">Activity Log</button>
    <button class="tab-button" onclick="showTab(3)">Accomplished Log</button>
  </div>

  <!-- Tab 1: Work Log -->
  <div class="tab" id="tab1">
    <div class="form-container">
      <div class="form-group">
        <label for="date">Date:</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label for="cem">CEM:</label>
        <input type="text" id="cem" oninput="suggestCem()">
        <div id="cem-suggestions"></div>
      </div>
      <div class="form-group">
        <label for="attorney">Atty. in Charge:</label>
        <input type="text" id="attorney" oninput="suggestAttorney()">
        <div id="attorney-suggestions"></div>
      </div>
      <div class="form-group">
        <label for="client">Client:</label>
        <input type="text" id="client" oninput="suggestClient()">
        <div id="client-suggestions"></div>
      </div>
      <div class="form-group">
        <label for="activity">Activity:</label>
        <input type="text" id="activity" oninput="suggestActivity()">
        <div id="activity-suggestions"></div>
      </div>
      <div class="form-group">
        <label for="status">Status:</label>
        <select id="status" onchange="handleStatusChange()">
          <option value="new">New</option>
          <option value="ongoing">Ongoing</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div id="update-container" style="display:none;">
        <div class="form-group">
          <label for="update">Update:</label>
          <input type="text" id="update">
        </div>
      </div>
      <button onclick="saveLog()">Enter</button>
    </div>

    <div class="history-container">
      <h2>Work Log History</h2>
      <table id="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>CEM</th>
            <th>Atty. in Charge</th>
            <th>Client</th>
            <th>Activity</th>
            <th>Status</th>
            <th>Update</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <!-- Tab 2: Activity Log -->
  <div class="tab" id="tab2">
    <div class="form-container">
      <div class="form-group">
        <label for="client-select">Select Client:</label>
        <select id="client-select" onchange="renderClientActivity()"></select>
      </div>
      <div class="history-container">
        <h2>Client Activity Log</h2>
        <table id="client-activity-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>CEM</th>
              <th>Atty. in Charge</th>
              <th>Activity</th>
              <th>Status</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Tab 3: Accomplished Log -->
  <div class="tab" id="tab3">
    <div class="history-container">
      <h2>Accomplished Logs</h2>
      <table id="accomplished-activity-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>CEM</th>
            <th>Atty. in Charge</th>
            <th>Activity</th>
            <th>Status</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="scripts.js"></script>
</body>
</html>
