<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Log</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Work Log</h1>

<div style="text-align: center;">
  <button class="tab-button active-tab-button" onclick="showTab(1)">Activity Log</button>
  <button class="tab-button" onclick="showTab(2)">Client Log</button>
  <button class="tab-button" onclick="showTab(3)">Removed Log</button>
</div>

<!-- TAB 1 -->
<div id="tab1" class="tab" style="display:block;">
  <div class="form-container">
    <div class="form-group">
      <label>Date:</label>
      <input type="date" id="date">
    </div>

    <!-- NEW: CEM -->
    <div class="form-group">
      <label>CEM:</label>
      <input type="text" id="cem" oninput="suggestCEM()" onfocus="suggestCEM()">
      <div id="cem-suggestions" style="display:none;"></div>
    </div>

    <!-- NEW: Atty in Charge -->
    <div class="form-group">
      <label>Atty. in Charge:</label>
      <input type="text" id="atty" oninput="suggestAtty()" onfocus="suggestAtty()">
      <div id="atty-suggestions" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label>Client:</label>
      <input type="text" id="client" oninput="suggestClient()" onfocus="suggestClient()">
      <div id="client-suggestions" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label>Activity:</label>
      <input type="text" id="activity" oninput="suggestActivity()">
      <div id="activity-suggestions" style="display:none;"></div>
    </div>

    <div class="form-group">
      <label>Status:</label>
      <select id="status">
        <option value="new">New</option>
        <option value="ongoing">On Going</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="form-group" id="update-container" style="display:none;">
      <label>Update:</label>
      <input type="text" id="update">
    </div>

    <div class="form-group">
      <button onclick="saveLog()">Enter</button>
    </div>
  </div>

  <div class="history-container">
    <div class="scrollable">
      <table id="history-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Client</th>
            <th>Activity</th>
            <th>Status</th>
            <th>Update</th>
            <th>CEM</th>
            <th>Atty. in Charge</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- TAB 2 -->
<div id="tab2" class="tab">
  <div class="client-activity-container">
    <label>Select Client:</label>
    <select id="client-select" onchange="renderClientActivity()"></select>

    <div class="scrollable">
      <table id="client-activity-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Activity</th>
            <th>Update</th>
            <th>Status</th>
            <th>CEM</th>
            <th>Atty. in Charge</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab">
  <div class="removed-clients-container">
    <div class="scrollable">
      <table id="removed-clients-table">
        <thead><tr><th>Client</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
